name: Update README Projects

on:
  push:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch repos safely
        run: |
          curl -s https://api.github.com/users/kasi8112/repos > repos.json
          jq '.' repos.json > /dev/null || (echo "Invalid JSON" && exit 1)

          jq -r '
            sort_by(-.pushed_at)
            | map(select(.fork == false))
            | .[:5]
            | .[]
            | "- [" + .name + "](" + .html_url + "): " + (.description // "No description")
          ' repos.json > projects.txt

      - name: Replace README section
        run: |
          awk '
          /<!--START_PROJECTS-->/ {
            print;
            while ((getline line < "projects.txt") > 0) print line;
            next
          }
          /<!--END_PROJECTS-->/ {print; next}
          !/<!--START_PROJECTS-->/ && !/<!--END_PROJECTS-->/
          ' README.md > new.md

          mv new.md README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "Auto update projects" || echo "No changes"
          git push
